name: AI Request Relay

on:
  repository_dispatch:
    types: [ai_request]

jobs:
  ai-process:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install firebase-admin@13

      - name: Create Relay Script
        run: |
          cat << 'EOF' > relay.js
          const { initializeApp, cert } = require('firebase-admin/app');
          const { getFirestore } = require('firebase-admin/firestore');

          async function run() {
            const requestId = process.env.REQUEST_ID;
            console.log('--- START RELAY ---');
            console.log('Request ID:', requestId);
            
            let db;
            try {
              if (!process.env.FIREBASE_SERVICE_ACCOUNT) throw new Error('Missing FIREBASE_SERVICE_ACCOUNT secret');
              if (!process.env.PAYLOAD) throw new Error('Missing PAYLOAD from client');

              // Init Firebase
              const sa = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);
              initializeApp({ credential: cert(sa) });
              db = getFirestore();
              
              // Parse Payload
              const payload = JSON.parse(process.env.PAYLOAD);
              const { messages, model, temperature, top_p, max_tokens, webSearchEnabled } = payload;
              
              // Select correct NVIDIA Key
              const isSuper = model?.includes('super');
              const apiKey = isSuper ? process.env.NVIDIA_API_KEY_SUPER : process.env.NVIDIA_API_KEY_NANO;
              if (!apiKey) throw new Error(`Missing ${isSuper ? 'SUPER' : 'NANO'} API Key in Secrets`);

              console.log('Using model:', model);

              // Prepare Body with Thinking (if 120B)
              const body = {
                model,
                messages,
                temperature: temperature || 1.0,
                top_p: top_p || 1.0,
                max_tokens: max_tokens || 1024,
                stream: false
              };
              
              if (isSuper) {
                // Enable thinking for 120B Super
                body.extra_body = {
                  chat_template_kwargs: { enable_thinking: true },
                  reasoning_budget: 16384
                };
              }

              // Call AI
              const response = await fetch('https://integrate.api.nvidia.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': 'Bearer ' + apiKey
                },
                body: JSON.stringify(body)
              });

              if (!response.ok) {
                const text = await response.text();
                throw new Error(`AI Provider Error (${response.status}): ${text.slice(0, 200)}`);
              }

              const data = await response.json();
              if (!data.choices || !data.choices[0]) throw new Error('AI Provider returned empty choices');

              // Process Thinking content if available
              const msg = data.choices[0].message;
              const content = msg.content;
              const reasoning = msg.reasoning_content || null;

              // Write Success
              await db.collection('ai_responses').doc(requestId).set({
                content: content,
                reasoning: reasoning, // We can show this in a separate bubble if we want
                status: 'completed',
                timestamp: Date.now()
              });
              console.log('--- SUCCESS ---');
            } catch (err) {
              console.error('--- FATAL ERROR ---');
              console.error(err.message);
              
              try {
                if (!db && process.env.FIREBASE_SERVICE_ACCOUNT) {
                   const sa = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);
                   initializeApp({ credential: cert(sa) }, 'error-app');
                   db = getFirestore('error-app');
                }
                if (db && requestId) {
                  await db.collection('ai_responses').doc(requestId).set({
                    error: err.message,
                    status: 'error',
                    timestamp: Date.now()
                  });
                }
              } catch (innerErr) {
                console.error('Failed to write error to Firestore:', innerErr.message);
              }
              process.exit(1);
            }
          }
          run();
          EOF

      - name: Execute Relay
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          NVIDIA_API_KEY_SUPER: ${{ secrets.NVIDIA_API_KEY_SUPER }}
          NVIDIA_API_KEY_NANO: ${{ secrets.NVIDIA_API_KEY_NANO }}
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
          REQUEST_ID: ${{ github.event.client_payload.requestId }}
        run: node relay.js
