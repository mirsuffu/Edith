name: AI Request Relay

on:
  repository_dispatch:
    types: [ai_request]

jobs:
  ai-process:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install firebase-admin@13

      - name: Create Relay Script
        run: |
          cat << 'EOF' > relay.js
          const { initializeApp, cert } = require('firebase-admin/app');
          const { getFirestore } = require('firebase-admin/firestore');

          async function run() {
            const requestId = process.env.REQUEST_ID;
            let db;
            try {
              const sa = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);
              initializeApp({ credential: cert(sa) });
              db = getFirestore();
              const payload = JSON.parse(process.env.PAYLOAD);
              
              const { messages, model, temperature, top_p, max_tokens } = payload;
              console.log('Processing request for ID:', requestId);

              const response = await fetch('https://integrate.api.nvidia.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': 'Bearer ' + process.env.NVIDIA_API_KEY
                },
                body: JSON.stringify({
                  model,
                  messages,
                  temperature: temperature || 0.2,
                  top_p: top_p || 0.7,
                  max_tokens: max_tokens || 1024,
                  stream: false
                })
              });

              if (!response.ok) {
                const text = await response.text();
                throw new Error(`NVIDIA API Error ${response.status}: ${text}`);
              }

              const data = await response.json();
              await db.collection('ai_responses').doc(requestId).set({
                content: data.choices[0].message.content,
                status: 'completed',
                timestamp: Date.now()
              });
              console.log('Success for ID:', requestId);
            } catch (err) {
              console.error('Fatal Error:', err.message);
              if (db && requestId) {
                await db.collection('ai_responses').doc(requestId).set({
                  error: err.message,
                  status: 'error',
                  timestamp: Date.now()
                });
              }
              process.exit(1);
            }
          }
          run();
          EOF

      - name: Execute Relay
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
          REQUEST_ID: ${{ github.event.client_payload.requestId }}
        run: node relay.js
