<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fan Loader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { cream: { bg: '#fdfbf7' }, amoled: { bg: '#000000' } } } } }
    </script>
    <style>
        :root { --loader-color: #3b82f6; }
        html.dark { --loader-color: #60a5fa; }
        
        /* Container for layering */
        .loader-combined {
            position: relative;
            width: 130px;
            height: 130px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loader-fan {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, var(--loader-color) 0%, transparent 40%, transparent 50%, var(--loader-color) 50%, transparent 90%);
            animation: spin 1s linear infinite;
            z-index: 2;
        }

        /* Large Ring Pulse */
        .loader-ring-pulse {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            z-index: 1;
            animation: ring-pulse-large 1.5s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
        }

        @keyframes spin { 
            to { transform: rotate(-360deg); } 
        }

        @keyframes ring-pulse-large { 
            0% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--loader-color) 70%, transparent); } 
            100% { box-shadow: 0 0 0 40px color-mix(in srgb, var(--loader-color) 0%, transparent); } 
        }
    </style>
    <script>
        // Auto-detect system theme for dark/light mode background
        if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        }
    </script>
</head>
<body class="bg-cream-bg dark:bg-amoled-bg min-h-screen flex items-center justify-center transition-colors duration-300">

    <div class="loader-combined">
        <div class="loader-ring-pulse"></div>
        <div class="loader-fan"></div>
    </div>

</body>
</html>
