<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dual Arc Loader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { cream: { bg: '#fdfbf7' }, amoled: { bg: '#000000' } } } } }
    </script>
    <style>
        :root { --loader-color: #3b82f6; }
        html.dark { --loader-color: #60a5fa; }
        
        .loader-multi-circle {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 4px solid transparent;
            border-top-color: var(--loader-color);
            border-bottom-color: var(--loader-color);
            animation: spin 1.5s cubic-bezier(0.68, -0.15, 0.265, 1.15) infinite;
            position: relative;
            filter: drop-shadow(0 0 8px var(--loader-color));
        }
        
        .loader-multi-circle::after {
            content: '';
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            bottom: 8px;
            border-radius: 50%;
            border: 4px solid transparent;
            border-left-color: var(--loader-color);
            border-right-color: var(--loader-color);
            animation: spin-rev 1s cubic-bezier(0.68, -0.15, 0.265, 1.15) infinite;
            opacity: 0.8;
        }

        @keyframes spin { 
            0% { transform: rotate(0deg) scale(1); } 
            50% { transform: rotate(180deg) scale(1.05); } 
            100% { transform: rotate(360deg) scale(1); } 
        }
        
        @keyframes spin-rev { 
            0% { transform: rotate(0deg) scale(1); } 
            50% { transform: rotate(-180deg) scale(0.95); } 
            100% { transform: rotate(-360deg) scale(1); } 
        }

        /* Container to stack the animations */
        .loader-combined {
            position: relative;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Override position to allow layering */
        .loader-multi-circle {
            position: absolute;
        }

        /* Ripple scaled to fit the 70px inner core */
        .loader-ripple { 
            position: relative; 
            width: 40px; 
            height: 40px; 
        } 
        .loader-ripple div { 
            position: absolute; 
            border: 2px solid var(--loader-color); 
            border-radius: 50%; 
            opacity: 1; 
            animation: ripple-anim 1.5s cubic-bezier(0, 0.2, 0.8, 1) infinite; 
        } 
        .loader-ripple div:nth-child(2) { 
            animation-delay: -0.75s; 
        } 
        @keyframes ripple-anim { 
            0% { top: 18px; left: 18px; width: 4px; height: 4px; opacity: 1; } 
            100% { top: 0; left: 0; width: 40px; height: 40px; opacity: 0; } 
        }
    </style>
    <script>
        // Auto-detect system theme for dark/light mode background
        if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        }
    </script>
</head>
<body class="bg-cream-bg dark:bg-amoled-bg min-h-screen flex items-center justify-center transition-colors duration-300">

    <div class="loader-combined">
        <div class="loader-multi-circle"></div>
        <div class="loader-ripple">
            <div></div>
            <div></div>
        </div>
    </div>

</body>
</html>
